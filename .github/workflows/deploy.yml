name: Deploy to GitHub Pages

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build production from main
        run: |
          git checkout main
          npm ci
          npm run build

      - name: Build staging from develop
        run: |
          if git show-ref --verify --quiet refs/remotes/origin/develop; then
            git checkout develop
            npm ci
            npx vite build --base=/voca-web/staging/ --outDir "$GITHUB_WORKSPACE/dist-staging"
            mkdir -p dist/staging
            cp -r dist-staging/* dist/staging/
          else
            echo "No develop branch found, skipping staging build"
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
